<html>
<head>
<title>BMW Form</title>
<link rel="stylesheet" href="decor.css">
</head>
<body class="form-page">
    
<form action="BMW info.html">
  <label for="fname">First name: </label>
  <input type="text" id="fname" name="fname"><br><br>
  <label for="lname">Last name: </label>
  <input type="text" id="lname" name="lname"><br><br>

<label for="cars">Choose a car:</label>

<select name="cars" id="cars">
  <option value="x5">x5</option>
  <option value="360i">360i</option>
  <option value="i7">i7</option>
  <option value="318i">318i</option>
</select>
  <p>Please select your favorite car type:</p>
  <input type="radio" id="SUV" name="fav_language" value="SUV">
  <label for="SUV">SUV</label><br>
  <input type="radio" id="sedan" name="fav_language" value="sedan">
  <label for="sedan">Sedan</label><br>
  <input type="radio" id="coupe" name="fav_language" value="coupe">
  <label for="coupe">coupe</label>

<p>Now choose your favourite car color:</p>
  <input type="checkbox" id="red" name="color" value="red">
  <label for="red"> Red</label><br>
  <input type="checkbox" id="blue" name="color" value="blue">
  <label for="blue"> Blue</label><br>
  <input type="checkbox" id="black" name="color" value="black">
  <label for="black"> Black</label><br>
  <input type="checkbox" id="white" name="color" value="white">
  <label for="white"> White</label><br>
<br><br>

 <input type="submit" value="Submit">
  <input type="reset" value="Reset">
</form>
</body>

</html>
